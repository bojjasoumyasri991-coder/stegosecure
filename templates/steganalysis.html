<!DOCTYPE html>
<html>
<head>
    <title>Steganalysis Detector</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            font-size: 40px;
        }

        .box {
            width: 550px;
            margin: 30px auto;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        /* Drag Area */
        .drop-area {
            border: 2px dashed #2d73ff;
            border-radius: 15px;
            padding: 40px;
            cursor: pointer;
            transition: 0.3s;
            background: #f8fbff;
        }

        .drop-area.hover {
            background: #e6f0ff;
        }

        .file-name {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }

        input[type="file"] {
            display: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2d73ff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #1c5de8;
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        .safe {
            background: #e8f8ee;
            color: #1a7f37;
        }

        .danger {
            background: #ffecec;
            color: #d93025;
        }

        .error {
            color: red;
            margin-top: 15px;
        }

        a.back {
            display: block;
            margin-top: 25px;
            text-decoration: none;
            color: #2d73ff;
            font-weight: bold;
        }

        a.back:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<h1>🕵️ Steganalysis Detector</h1>

<div class="box">

    <form method="POST" enctype="multipart/form-data" id="uploadForm">

        <div class="drop-area" id="dropArea">
            <p>📂 Drag & Drop File Here</p>
            <p>or Click to Select</p>
            <input type="file" name="file" id="fileInput" required>
            <div class="file-name" id="fileName"></div>
        </div>

        <button type="submit">Analyze File</button>

    </form>

    {% if result == "⚠ Hidden Data Detected" %}
        <div class="result-box danger">
            ⚠️ Hidden Data Detected
        </div>

    {% elif result == "✅ No Hidden Data Detected" %}
        <div class="result-box safe">
            ✅ No Hidden Data Detected
        </div>
    {% endif %}

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

</div>

<a href="/" class="back">← Back to Home</a>

<script>
    const dropArea = document.getElementById("dropArea");
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");

    // Click to open file dialog
    dropArea.addEventListener("click", () => {
        fileInput.click();
    });

    // Show selected file name
    fileInput.addEventListener("change", () => {
        if (fileInput.files.length > 0) {
            fileName.textContent = "Selected: " + fileInput.files[0].name;
        }
    });

    // Drag over
    dropArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropArea.classList.add("hover");
    });

    dropArea.addEventListener("dragleave", () => {
        dropArea.classList.remove("hover");
    });

    // Drop file
    dropArea.addEventListener("drop", (e) => {
        e.preventDefault();
        dropArea.classList.remove("hover");

        const files = e.dataTransfer.files;
        if (files.length > 0) {
            fileInput.files = files;
            fileName.textContent = "Selected: " + files[0].name;
        }
    });
</script>

</body>
</html>
